runtime: local

models:
  demucs/htdemucs_6s:
    adapter: demucs
    model_name: htdemucs_6s
    device: mps
  basic-pitch/v1:
    adapter: basic_pitch
    onset_threshold: 0.5
    frame_threshold: 0.3
  mediapipe/hands:
    adapter: mediapipe
    min_detection_confidence: 0.7
    min_tracking_confidence: 0.5
  librosa/beat:
    adapter: librosa
  bs-roformer/guitar-4stem:
    adapter: bs_roformer
    checkpoint: null
    device: mps
    segment_size: 256
  bs-roformer/vocals-isolation:
    adapter: bs_roformer
    checkpoint: null
    device: mps
    segment_size: 256
  wave-unet/guitar-demix:
    adapter: wave_unet
    weights_path: null
    device: mps
  hpss/guitar-demix:
    adapter: hpss_demix
  spectral/dereverb:
    adapter: spectral_dereverb
    strength: 0.65
    decay_ms: 80
    floor: 0.12
    transient_mix: 0.18
