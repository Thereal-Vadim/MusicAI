# Stage → model routing. Primary is tried first; fallbacks run when healthcheck() is false
# or predict() raises. Swap IDs here without touching pipeline code.

coarse_separation:
  primary: ensemble/roformer_plus_demucs
  ensemble:
    step_1: bs-roformer/vocals-isolation
    step_2: demucs/htdemucs_6s
  fallbacks:
    - demucs/htdemucs_6s

guitar_demix:
  primary: wave-unet/guitar-demix
  fallbacks: []

# DI cleanup (spectral dereverb + hard noise gate) after demix, before Basic Pitch
audio_cleanup:
  enabled: true
  primary: spectral/dereverb
  fallbacks: []

# Guitar timbre classification (AST AudioSet) after cleanup
timbre_classify:
  enabled: true
  primary: audio-classifier/ast-audioset
  fallbacks: []

fingering:
  optimizer: aco
  aco:
    n_ants: 24
    n_iterations: 50
    max_fret_span: 4
    open_string_bonus: 2.0
    string_skip_penalty: 3.5
